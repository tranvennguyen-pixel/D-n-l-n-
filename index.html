<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Cục Dàng</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        #intro { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        button { padding: 25px 50px; font-size: 25px; border-radius: 50px; border: none; background: #ff4d6d; color: white; cursor: pointer; font-weight: bold; }
        #main-content { display: none; padding: 40px 20px; }
        #message { font-size: 20px; color: #ffdee9; margin: 30px auto; max-width: 800px; line-height: 1.8; border: 2px solid #ff4d6d; padding: 20px; border-radius: 20px; background: rgba(255,77,109,0.1); }
        .album-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 30px; }
        img { width: 100%; border-radius: 15px; border: 3px solid #ff4d6d; }
    </style>
</head>
<body>

<div id="intro">
    <h1 style="color: #ff4d6d; font-size: 50px;">HAPPY BIRTHDAY</h1>
    <button onclick="start()">BẤM ĐỂ MỞ QUÀ</button>
</div>

<div id="main-content">
    <h1 style="color: #ff4d6d;">Gửi Cục Dàng Iuuu Dấu</h1>
    <div id="message"></div>
    <div class="album-grid">
        <img src="Ảnh1.jpeg"><img src="Ảnh2.jpeg"><img src="Ảnh3.jpeg"><img src="Ảnh4.jpeg">
        <img src="Ảnh5.jpeg"><img src="Ảnh6.jpeg"><img src="Ảnh7.jpeg">
    </div>
</div>

<audio id="myAudio" loop><source src="Phaohoa.mp3" type="audio/mpeg"></audio>

<script>
    function start() {
        document.getElementById('myAudio').play();
        document.getElementById('intro').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        confetti({ particleCount: 300, spread: 200, origin: { y: 0.6 } });
        
        const content = "Chúc cục dàng iuuu dấu của chồng 1 năm sinh nhật thật là vui vẻ nè chồng mong là chúc ta sau này và mãi về sau nữa sẽ ở bên nhau thật lâu luôn nè chúc cho cục kim cương iuuu dấu của chồng buổi sinh nhật vui vẻ và hạnh phúc đặc biệt năm nay có chồng nè chồng hong bt là mấy năm trước heo có đón sinh nhật v ng iu chx mà chồng thì sẽ khảc v mấy người trc kia của heo chồng hy vọng chồng hong phải là người đầu nhưng mà hy vọng chồng sẽ là người heo cảm thấy hạnh phúc và an toàn vui vẻ khi ở bên và hy vọng chồng sẽ là người cuối cùng của em ạ anhh yeeuuu emmm💗";
        let i = 0;
        function typing() {
            if (i < content.length) {
                document.getElementById("message").innerHTML += content.charAt(i);
                i++;
                setTimeout(typing, 60);
            }
        }
        typing();
    }
</script>
</body>
</html>
