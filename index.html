<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kỷ Niệm</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #333; font-family: 'Arial', sans-serif; text-align: center; overflow: hidden; }
        
        .phase { display: none; width: 100vw; height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        /* Hình nền các giai đoạn */
        #phase1 { display: flex; background-image: url('Nengiaodiendau.png'); background-size: cover; background-position: center; }
        #phase2 { background: radial-gradient(circle, #000000 0%, #1a1a1a 100%); overflow: hidden; }
        #phase3 { background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 100%); }
        #phase4 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        #phase5 { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }

        /* Nút bấm chung */
        .btn { padding: 15px 35px; font-size: 22px; border-radius: 50px; border: none; cursor: pointer; z-index: 10; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.2s; background: linear-gradient(45deg, #ff4d4d, #ff758c); color: white; }
        .btn:hover { transform: scale(1.05); }
        .btn-blue { background: #007bff; margin-top: 20px; }

        /* Chữ rơi Phase 2 */
        .falling-text { position: absolute; font-size: 22px; font-weight: bold; color: #ff4d4d; text-shadow: 0 0 10px rgba(255,255,255,0.8); animation: float3D linear infinite; z-index: 5; }
        @keyframes float3D {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Bánh kem Phase 2 */
        .cake-container { z-index: 10; margin-bottom: 20px; }
        #cake-img { width: 300px; max-width: 80vw; border-radius: 20px; box-shadow: 0 10px 30px rgba(255,105,180,0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Đếm ngược thời gian Phase 4 */
        .timer-box { background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 10px; border: 2px solid #ff758c; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 10;}
        .time-item { display: flex; flex-direction: column; align-items: center; border: 1px solid #ff4d4d; padding: 10px; border-radius: 10px; min-width: 60px;}
        .time-val { font-size: 24px; font-weight: bold; color: #ff4d4d; }
        .time-label { font-size: 12px; color: #333; }
        
        /* Khung ảnh kỷ niệm Phase 4 */
        .album-container { width: 90%; max-width: 350px; background: white; padding: 10px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-bottom: 20px; z-index: 10;}
        #album-img { width: 100%; height: auto; border-radius: 10px; aspect-ratio: 3/4; object-fit: cover; }
        .controls { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .btn-page { padding: 8px 15px; background: #ff758c; border: none; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; }

        /* QR Phase 5 */
        .qr-card { background: white; padding: 20px; border-radius: 20px; border: 3px dashed #ff4d4d; max-width: 80%; }
        .qr-card p { font-size: 18px; font-weight: bold; color: #ff4d4d; margin-bottom: 15px; }
        #qr-img { width: 200px; height: 200px; border-radius: 10px; }
        
        /* Hiệu ứng bong bóng nền */
        .balloon { position: absolute; bottom: -100px; border-radius: 50%; opacity: 0.6; animation: floatUp linear infinite; z-index: 1; }
        @keyframes floatUp { to { transform: translateY(-120vh) rotate(100deg); } }
    </style>
</head>
<body>

    <audio id="sound-chucmung" src="Tiengchucmungsinhnhat.mp3"></audio>
    <audio id="sound-phaohoa" src="Phaohoa.mp3" loop></audio>
    <audio id="sound-votay" src="Votay.mp3"></audio>

    <div id="phase1" class="phase">
        <button class="btn" onclick="goToPhase2()">Bấm vô đây nè bé yêu ❤️</button>
    </div>

    <div id="phase2" class="phase">
        <div id="rain-container"></div>
        <div class="cake-container">
            <img id="cake-img" src="Banhkem2D.png" alt="Bánh kem bé heo">
        </div>
        <button class="btn btn-blue" onclick="goToPhase4()">Đọc Thư & Kỷ Niệm</button>
    </div>

    <div id="phase4" class="phase">
        <h2 style="color: #ff4d4d; font-weight: bold; text-shadow: 1px 1px white; z-index: 10;">❤️ THỜI GIAN MÌNH BÊN NHAU ❤️</h2>
        
        <div class="timer-box">
            <div class="time-item"><span class="time-val" id="t-days">0</span><span class="time-label">Ngày</span></div>
            <div class="time-item"><span class="time-val" id="t-hours">0</span><span class="time-label">Giờ</span></div>
            <div class="time-item"><span class="time-val" id="t-mins">0</span><span class="time-label">Phút</span></div>
            <div class="time-item"><span class="time-val" id="t-secs">0</span><span class="time-label">Giây</span></div>
        </div>

        <div class="album-container">
            <img id="album-img" src="Ảnh1.jpeg" alt="Ảnh kỷ niệm">
            <div class="controls">
                <button class="btn-page" onclick="prevPage()">⬅ Lật Về</button>
                <span id="page-indicator" style="font-weight: bold; color: #ff758c;">1 / 7</span>
                <button class="btn-page" onclick="nextPage()">Lật Tới ➡</button>
            </div>
        </div>

        <button class="btn" style="background: #007bff;" onclick="goToPhase5()">Nhận Món Quà Bí Mật ✨</button>
    </div>

    <div id="phase5" class="phase">
        <div class="qr-card">
            <p>✨ Quét mã này bằng Zalo hoặc Camera để nhận điều bí mật tiếp theo nha bé yêu! ✨</p>
            <img id="qr-img" src="anhmaQR.png" alt="Mã QR Bí Mật">
        </div>
    </div>

    <script>
        // --- HÀM ÂM THANH AN TOÀN ---
        function playSafe(id) {
            try {
                let el = document.getElementById(id);
                if (el) {
                    let promise = el.play();
                    if (promise !== undefined) {
                        promise.catch(error => console.log("Trình duyệt chặn tự động phát nhạc:", error));
                    }
                }
            } catch(e) {}
        }
        function stopAllAudio() {
            try {
                document.getElementById('sound-phaohoa').pause();
                document.getElementById('sound-votay').pause();
                document.getElementById('sound-chucmung').pause();
            } catch(e) {}
        }

        // --- TẠO CHỮ RƠI PHASE 2 ---
        function createSlowRain() {
            const container = document.getElementById('rain-container');
            const texts = ["Chúc mừng sinh nhật", "Anh Yêu Em ❤️", "Cục Vàng Của Anh", "Mãi Bên Nhau Nhé"];
            for(let i=0; i<30; i++) {
                let drop = document.createElement('div');
                drop.className = 'falling-text';
                drop.innerText = texts[Math.floor(Math.random() * texts.length)];
                drop.style.left = Math.random() * 90 + 'vw';
                drop.style.animationDuration = (Math.random() * 5 + 7) + 's';
                drop.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(drop);
            }
        }

        // --- HIỆU ỨNG BẮN PHÁO HOA ---
        function fireworkEffect() {
            if (typeof confetti === 'undefined') return;
            var duration = 15 * 1000;
            var animationEnd = Date.now() + duration;
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50;
                confetti({ particleCount, spread: 360, startVelocity: 30, origin: { x: Math.random(), y: Math.random() - 0.2 }, zIndex: 300 });
            }, 250);
        }

        // --- ĐẾM NGƯỢC THỜI GIAN KỶ NIỆM ---
        // SỬA NGÀY BẮT ĐẦU YÊU NHAU Ở ĐÂY (Năm-Tháng-Ngày)
        const startDate = new Date('2026-05-18T00:00:00'); 
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            document.getElementById('t-days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('t-hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('t-mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('t-secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }
        setInterval(updateTimer, 1000);

        // --- LOGIC LẬT SÁCH ẢNH ---
        let currentPage = 1;
        const totalPages = 7; // Bạn có 7 ảnh từ Ảnh1.jpeg đến Ảnh7.jpeg
        function updatePage() {
            document.getElementById('album-img').src = `Ảnh${currentPage}.jpeg`;
            document.getElementById('page-indicator').innerText = `${currentPage} / ${totalPages}`;
        }
        function prevPage() { if(currentPage > 1) { currentPage--; updatePage(); } }
        function nextPage() { if(currentPage < totalPages) { currentPage++; updatePage(); } }

        // --- CHUYỂN TRANG ---
        function goToPhase2() {
            document.getElementById('phase1').style.display = 'none';
            document.getElementById('phase2').style.display = 'flex';
            playSafe('sound-chucmung');
            playSafe('sound-phaohoa');
            fireworkEffect();
            createSlowRain();
        }

        function goToPhase4() {
            document.getElementById('phase2').style.display = 'none';
            document.getElementById('phase4').style.display = 'flex';
            updateTimer();
        }

        function goToPhase5() {
            document.getElementById('phase4').style.display = 'none';
            document.getElementById('phase5').style.display = 'flex';
            stopAllAudio();
            playSafe('sound-votay');
        }
    </script>
</body>
</html>
