<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
} canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:#000;
}

#startScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#birthdayScreen{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.happy{
font-size:45px;
color:#ff69b4;
text-shadow:0 0 20px hotpink;
animation:pulse 1s infinite;
}

#photo{
width:250px;
border-radius:20px;
box-shadow:0 0 20px hotpink;
margin:20px 0;
}

#letter{
background:white;
padding:20px;
border-radius:20px;
max-width:700px;
font-size:20px;
line-height:1.8;
}

body{
background:linear-gradient(135deg,#ff4fa3,#ff89c2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

button{
padding:18px 40px;
font-size:28px;
border:none;
border-radius:50px;
background:#ff1493;
color:white;
cursor:pointer;
box-shadow:0 0 25px hotpink;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:700px;
background:white;
padding:25px;
border-radius:20px;
display:none;
box-shadow:0 0 30px rgba(0,0,0,.4);
animation:zoom .5s;
}

@keyframes zoom{
from{transform:translate(-50%,-50%) scale(.5);}
to{transform:translate(-50%,-50%) scale(1);}
}

h1{
color:#ff1493;
text-align:center;
margin-bottom:20px;
}

#text{
font-size:20px;
line-height:1.8;
white-space:pre-wrap;
}

.close{
margin-top:20px;
width:100%;
background:#ff1493;
padding:15px;
font-size:22px;
}

.cursor{
display:inline-block;
width:3px;
background:#ff1493;
animation:blink .8s infinite;
}

@keyframes blink{
50%{opacity:0;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="startScreen">
    <button id="enterBtn">💗 BẤM VÀO ĐÂY BÉ ƠI 💗</button>
</div>

<div id="birthdayScreen" style="display:none;">
    <h1 class="happy">🎂 HAPPY BIRTHDAY 🎂</h1>

    <div id="photoSlider">
        <img id="photo" src="photo1.jpg">
    </div>

    <div id="letter">
        <h2>💌 Gửi bé yêu 💌</h2>
        <p id="text"></p>
    </div>
</div>

<script>

const message=`Gửi bé yêu của anh ❤️

Chúc cục dàng iuuu dấu của chồng 1 năm sinh nhật thật là vui vẻ nè.

Chồng mong là chúng ta sau này và mãi về sau nữa sẽ ở bên nhau thật lâu luôn nè.

Chúc cho cục kim cương iuuu dấu của chồng có một buổi sinh nhật thật vui vẻ và hạnh phúc.

Đặc biệt năm nay có chồng nè.

Chồng không biết mấy năm trước heo có đón sinh nhật với người yêu chưa, nhưng chồng sẽ khác với những người trước kia của heo.

Chồng hy vọng chồng không phải là người đầu tiên, nhưng sẽ là người cuối cùng của em.

Anh yêu em rất nhiều ❤️`;

❤️ Happy Birthday ❤️`;

function openLetter(){

document.getElementById("letter").style.display="block";

const text=document.getElementById("text");

text.innerHTML="";

let i=0;

function type(){

if(i<message.length){

text.innerHTML+=message.charAt(i);

i++;

setTimeout(type,40);

}else{

text.innerHTML+='<span class="cursor"></span>';

}

}

type();

}

</script>

</body>
</html>
