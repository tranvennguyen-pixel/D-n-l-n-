<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Bất Ngờ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; color: #333; font-family: 'Arial', sans-serif; text-align: center; overflow: hidden; background: #ffe6ea; }
        
        .phase { display: none; width: 100vw; height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; overflow: hidden; }
        
        #phase1 { display: flex; background-image: url('Nengiaodiendau.png'); background-size: cover; background-position: center; }
        #phase2 { background: radial-gradient(circle, #fff0f5 0%, #ffc0cb 100%); }
        #phase3 { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
        #phase4 { background: linear-gradient(to right, #ffecd2 0%, #fcb69f 100%); }
        #phase5 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); }

        button { padding: 15px 35px; font-size: 22px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; z-index: 50; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: pulse 1.5s infinite; transition: 0.3s; }
        button:hover { transform: scale(1.1) !important; box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
        .btn-red { background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; }
        .btn-blue { background: linear-gradient(45deg, #007bff, #00d2ff); color: white; margin-top: 40px; }
        .btn-green { background: linear-gradient(45deg, #28a745, #84fab0); color: white; margin-top: 30px; display: none; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .falling-text { position: absolute; font-size: 22px; font-weight: bold; color: #ff4d6d; text-shadow: 0 0 10px rgba(255,255,255,0.8); animation: fall linear infinite; opacity: 0.8; z-index: 5; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

        .cake-container { position: relative; z-index: 10; margin-bottom: 20px; perspective: 1000px; }
        .cake-3d { width: 280px; border-radius: 20px; filter: drop-shadow(0 30px 20px rgba(0,0,0,0.4)); animation: float3D 5s ease-in-out infinite; transform-style: preserve-3d; }
        @keyframes float3D { 0% { transform: translateY(0px) rotateY(-15deg) rotateX(5deg); } 50% { transform: translateY(-30px) rotateY(15deg) rotateX(-5deg) scale(1.05); filter: drop-shadow(0 40px 25px rgba(0,0,0,0.3)); } 100% { transform: translateY(0px) rotateY(-15deg) rotateX(5deg); } }

        #envelope-container { cursor: pointer; animation: pulse 2s infinite; z-index: 10; }
        .envelope { width: 280px; height: 200px; background: #ff758c; position: relative; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin: 0 auto; }
        .envelope::before { content: ''; position: absolute; top: 0; left: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 110px solid #ff4d6d; z-index: 2; }
        .envelope-text { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 26px; color: white; z-index: 3; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); width: 100%; }
        
        #open-letter { display: none; background: rgba(255, 255, 255, 0.85); border: 3px solid #ff4d6d; border-radius: 20px; padding: 30px; max-width: 90%; width: 600px; position: relative; box-shadow: 0 15px 40px rgba(255, 77, 109, 0.4); z-index: 10; animation: fadeIn 1s; backdrop-filter: blur(5px); }
        .heart-center { font-size: 55px; color: #ff4d6d; margin-bottom: 15px; animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        #message-text { font-size: 20px; line-height: 1.6; text-align: left; min-height: 150px; color: #333; font-weight: 500; }
        
        .flower-corner { position: absolute; bottom: -30px; right: -30px; width: 120px; z-index: 20; transform: rotate(-10deg); filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); animation: sway 3s ease-in-out infinite; }
        @keyframes sway { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(-5deg); } }

        .floating-heart { position: absolute; color: #ff4d6d; font-size: 30px; animation: floatHeart 2.5s ease-out infinite; opacity: 0; z-index: 1; }
        @keyframes floatHeart { 0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateY(-200px) scale(1.5) rotate(45deg); opacity: 0; } }

        /* ĐỒNG HỒ TÌNH YÊU */
        .counter-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; z-index: 10; position: relative; }
        .counter-box { background: rgba(255, 255, 255, 0.95); border: 3px solid #ff4d6d; border-radius: 15px; padding: 10px; width: 70px; box-shadow: 0 8px 20px rgba(255,77,109,0.3); display: flex; flex-direction: column; align-items: center; }
        .counter-number { font-size: 28px; font-weight: bold; color: #ff4d6d; }
        .counter-label { font-size: 14px; color: #555; font-weight: bold; margin-top: 5px; }

        .book-container { width: 90%; max-width: 450px; margin: 0 auto; position: relative; z-index: 10; perspective: 1200px; }
        .book-page { width: 100%; height: 400px; object-fit: cover; border-radius: 15px; border: 8px solid #fff; box-shadow: 0 15px 40px rgba(0,0,0,0.3); display: none; background: #fff; }
        .active-page { display: block; animation: flipPage 0.8s ease-out forwards; transform-origin: left center; }
        @keyframes flipPage { 0% { transform: rotateY(-90deg); opacity: 0; } 100% { transform: rotateY(0deg); opacity: 1; } }
        
        .page-controls { margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 20; position: relative; }
        .btn-page { padding: 10px 20px; background: #fff; color: #ff4d6d; border: 3px solid #ff4d6d; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,77,109,0.3); }
        .btn-page:hover { background: #ff4d6d; color: #fff; }

        #btn-go-qr { display: none; background: linear-gradient(45deg, #ff007f, #ff758c); color: white; font-size: 22px; padding: 15px 35px; margin-top: 15px; border-radius: 50px; animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .qr-card { background: rgba(255, 255, 255, 0.9); border-radius: 25px; padding: 35px; box-shadow: 0 20px 50px rgba(255, 20, 147, 0.3); border: 4px dashed #ff4d6d; max-width: 90%; width: 400px; z-index: 10; animation: fadeIn 1.2s ease-in-out; }
        .qr-instruction { font-size: 22px; font-weight: bold; color: #d81b60; margin-bottom: 20px; line-height: 1.4; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .qr-image { width: 250px; height: 250px; object-fit: contain; border-radius: 15px; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); animation: zoomInOut 4s ease-in-out infinite; }
        @keyframes zoomInOut { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .balloon { position: absolute; bottom: -100px; width: 60px; height: 75px; background: #ff4d6d; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; animation: floatUp 6s ease-in-out infinite; opacity: 0.85; z-index: 2; box-shadow: inset -10px -10px 15px rgba(0,0,0,0.1); }
        .balloon::before { content: ""; position: absolute; bottom: -15px; left: 29px; width: 2px; height: 40px; background: rgba(255,255,255,0.8); }
        @keyframes floatUp { to { transform: translateY(-120vh) translateX(30px) rotate(10deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="sound-phaohoa" src="Phaohoa.mp3" loop></audio>
    <audio id="sound-votay" src="Votay.mp3"></audio>
    <audio id="sound-chucmung" src="Tiengchucmungsinhnhat.mp3"></audio>

    <div id="phase1" class="phase">
        <button class="btn-red" onclick="goToPhase2()">Bấm vô đây nè bé yêu ❤</button>
    </div>

    <div id="phase2" class="phase">
        <div id="rain-container-p2"></div>
        <div id="balloons-p2"></div>
        <div class="cake-container">
            <img class="cake-3d" src="Banhkem2D.png" alt="Bánh Kem Chủ Đề Heo">
        </div>
        <button class="btn-blue" onclick="goToPhase3()">Đọc Thư Tình</button>
    </div>

    <div id="phase3" class="phase">
        <div id="envelope-container" onclick="openLetter()">
            <div class="envelope">
                <div class="envelope-text">💌 Mở Thư Bé Ơi 💌</div>
            </div>
        </div>

        <div id="open-letter">
            <div class="heart-center">❤️</div>
            <div id="message-text"></div>
            <img class="flower-corner" src="Hoa.png" alt="Hoa trang trí">
        </div>
        
        <button id="btn-next-p4" class="btn-green" onclick="goToPhase4()">Xem Kỷ Niệm Nè</button>
    </div>

    <div id="phase4" class="phase">
        <div id="balloons-p4"></div>
        
        <h1 style="color: #ff4d6d; text-shadow: 2px 2px 0px #fff, 0 0 15px #fff; margin-bottom: 10px; z-index: 10; position: relative; font-size: 26px;">💖 THỜI GIAN MÌNH BÊN NHAU 💖</h1>
        
        <div class="counter-container">
            <div class="counter-box">
                <span id="love-days" class="counter-number">00</span>
                <span class="counter-label">Ngày</span>
            </div>
            <div class="counter-box">
                <span id="love-hours" class="counter-number">00</span>
                <span class="counter-label">Giờ</span>
            </div>
            <div class="counter-box">
                <span id="love-mins" class="counter-number">00</span>
                <span class="counter-label">Phút</span>
            </div>
            <div class="counter-box">
                <span id="love-secs" class="counter-number">00</span>
                <span class="counter-label">Giây</span>
            </div>
        </div>

        <div class="book-container">
            <img id="book-img" class="book-page active-page" src="Ảnh1.jpeg">
        </div>
        
        <div class="page-controls">
            <button class="btn-page" onclick="prevPage()">⬅ Lật Về</button>
            <span id="page-counter" style="line-height: 40px; font-weight: bold; font-size: 20px; color: #ff4d6d; background: #fff; padding: 0 15px; border-radius: 20px; border: 2px solid #ff4d6d;">1 / 12</span>
            <button class="btn-page" onclick="nextPage()">Lật Tới ➡</button>
        </div>

        <button id="btn-go-qr" onclick="goToPhase5()">Nhận Món Quà Cuối Cùng 🎁</button>
    </div>

    <div id="phase5" class="phase">
        <div id="balloons-p5"></div>
        <div class="qr-card">
            <div class="qr-instruction">✨ Quét mã này bằng Zalo hoặc Camera để nhận điều bí mật tiếp theo nha bé yêu! ✨</div>
            <img class="qr-image" src="AnhmaQR.png" alt="Mã QR Bí Mật">
        </div>
    </div>

    <script>
        // HÀM PHÁT ÂM THANH AN TOÀN
        function playSafe(id) {
            try {
                let el = document.getElementById(id);
                if(el) {
                    let promise = el.play();
                    if (promise !== undefined) {
                        promise.catch(error => console.log("Âm thanh bị chặn:", error));
                    }
                }
            } catch(e) {}
        }

        function stopAllAudio() {
            try {
                document.getElementById('sound-phaohoa').pause();
                document.getElementById('sound-votay').pause();
                document.getElementById('sound-chucmung').pause();
            } catch(e) {}
        }

        function createBalloons(containerId, count) {
            try {
                const container = document.getElementById(containerId);
                container.innerHTML = ''; 
                const colors = ['#ff4d6d', '#ff758c', '#ffdee9', '#007bff', '#28a745', '#ffd700', '#ff69b4'];
                for(let i=0; i<count; i++) {
                    let balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    balloon.style.left = Math.random() * 100 + 'vw';
                    balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
                    balloon.style.animationDuration = (Math.random() * 4 + 5) + 's';
                    balloon.style.animationDelay = Math.random() * 3 + 's';
                    container.appendChild(balloon);
                }
            } catch(e) {}
        }

        function fireworkEffect() {
            try {
                if (typeof confetti === 'undefined') return;
                var duration = 15 * 1000;
                var animationEnd = Date.now() + duration;
                var interval = setInterval(function() {
                    if (Date.now() > animationEnd) return clearInterval(interval);
                    confetti({ particleCount: 60, spread: 360, origin: { x: Math.random(), y: Math.random() - 0.2 }, zIndex: 50, colors: ['#ff4d6d', '#ff758c', '#fff', '#ffd700'] });
                }, 300);
            } catch(e) {}
        }

        function createSlowRain(containerId) {
            try {
                const container = document.getElementById(containerId);
                const texts = ["Happy Birthday", "Anh Yêu Em ❤️", "Cục Dàng Của Anh", "Sinh Nhật Vui Vẻ Nha", "My Love 💕"];
                for(let i = 0; i < 25; i++) {
                    let drop = document.createElement('div');
                    drop.className = 'falling-text';
                    drop.innerText = texts[Math.floor(Math.random() * texts.length)];
                    drop.style.left = Math.random() * 95 + 'vw';
                    drop.style.animationDuration = (Math.random() * 8 + 7) + 's';
                    drop.style.animationDelay = (Math.random() * 5) + 's';
                    container.appendChild(drop);
                }
            } catch(e) {}
        }

        // HÀM CHẠY ĐỒNG HỒ TÌNH YÊU
        function startLoveCounter() {
            // Ngày bắt đầu yêu: Cách ngày hiện tại 54 ngày (18/05/2026)
            const startDate = new Date("2026-05-18T00:00:00").getTime();
            
            setInterval(function() {
                const now = new Date().getTime();
                const distance = now - startDate;
                
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                document.getElementById("love-days").innerText = days;
                document.getElementById("love-hours").innerText = hours.toString().padStart(2, '0');
                document.getElementById("love-mins").innerText = minutes.toString().padStart(2, '0');
                document.getElementById("love-secs").innerText = seconds.toString().padStart(2, '0');
            }, 1000);
        }

        function goToPhase2() {
            document.getElementById('phase1').style.display = 'none';
            document.getElementById('phase2').style.display = 'flex';
            playSafe('sound-phaohoa');
            fireworkEffect();
            createBalloons('balloons-p2', 20);
            createSlowRain('rain-container-p2');
        }

        function goToPhase3() {
            document.getElementById('phase2').style.display = 'none';
            document.getElementById('phase3').style.display = 'flex';
            try { document.getElementById('sound-phaohoa').pause(); } catch(e) {}
        }

        function openLetter() {
            document.getElementById('envelope-container').style.display = 'none';
            document.getElementById('open-letter').style.display = 'block';
            
            try { document.getElementById('sound-votay').currentTime = 0; } catch(e) {}
            playSafe('sound-votay');

            setInterval(() => {
                let heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerText = '❤';
                heart.style.left = (Math.random() * 90) + '%';
                heart.style.bottom = '20px';
                document.getElementById('open-letter').appendChild(heart);
                setTimeout(() => heart.remove(), 2500);
            }, 300);

            const content = "Chúc cục dàng iuuu dấu của chồng 1 năm sinh nhật thật là vui vẻ nè chồng mong là chúc ta sau này và mãi về sau nữa sẽ ở bên nhau thật lâu luôn nè chúc cho cục kim cương iuuu dấu của chồng buổi sinh nhật vui vẻ và hạnh phúc đặc biệt năm nay có chồng nè chồng hong bt là mấy năm trước heo có đón sinh nhật v ng iu chx mà chồng thì sẽ khác v mấy người trc kia của heo chồng hy vọng chồng hong phải là người đầu nhưng mà hy vọng chồng sẽ là người heo cảm thấy hạnh phúc và an toàn vui vẻ khi ở bên và hy vọng chồng sẽ là người cuối cùng của em ạ anhh yeeuuu emmm💗";
            let i = 0;
            function typing() {
                if (i < content.length) {
                    document.getElementById("message-text").innerHTML += content.charAt(i);
                    i++;
                    setTimeout(typing, 50);
                } else {
                    document.getElementById('btn-next-p4').style.display = 'block';
                }
            }
            setTimeout(typing, 600);
        }

        function goToPhase4() {
            document.getElementById('phase3').style.display = 'none';
            document.getElementById('phase4').style.display = 'flex';
            
            stopAllAudio();
            playSafe('sound-chucmung');
            setTimeout(() => {
                try { document.getElementById('sound-votay').currentTime = 0; } catch(e) {}
                playSafe('sound-votay');
            }, 2000);

            createBalloons('balloons-p4', 25);
            try {
                if (typeof confetti !== 'undefined') {
                    confetti({ particleCount: 250, spread: 180, origin: { y: 0.1 }, colors: ['#ff4d6d', '#fff', '#ffd700'] });
                }
            } catch(e) {}

            // Kích hoạt đồng hồ khi vào giai đoạn 4
            startLoveCounter();
        }

        // TỔNG CỘNG CÓ 12 TRANG
        let currentPage = 1;
        const totalPages = 12;
        
        function updatePage() {
            const imgEl = document.getElementById('book-img');
            imgEl.classList.remove('active-page');
            void imgEl.offsetWidth; 
            
            // Xử lý logic tên ảnh khác nhau
            if(currentPage <= 7) {
                // Trang 1 đến 7: Ảnh1.jpeg -> Ảnh7.jpeg
                imgEl.src = 'Ảnh' + currentPage + '.jpeg';
            } else {
                // Trang 8 đến 12: anhkiniem1.jpg -> anhkiniem5.jpg
                let k = currentPage - 7;
                imgEl.src = 'anhkiniem' + k + '.jpg';
            }

            imgEl.classList.add('active-page');
            document.getElementById('page-counter').innerText = currentPage + ' / ' + totalPages;

            // CHỈ hiện nút Quà khi tới trang cuối cùng (trang 12)
            if (currentPage === totalPages) {
                document.getElementById('btn-go-qr').style.display = 'inline-block';
            } else {
                document.getElementById('btn-go-qr').style.display = 'none';
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                updatePage();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                updatePage();
            }
        }

        function goToPhase5() {
            document.getElementById('phase4').style.display = 'none';
            document.getElementById('phase5').style.display = 'flex';
            
            try { document.getElementById('sound-votay').currentTime = 0; } catch(e) {}
            playSafe('sound-votay');
            
            createBalloons('balloons-p5', 30);
            
            try {
                if (typeof confetti !== 'undefined') {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
