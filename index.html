<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Bất Ngờ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; color: #333; font-family: 'Arial', sans-serif; text-align: center; overflow: hidden; background: #ffe6ea; }
        
        /* CÁC GIAI ĐOẠN */
        .phase { display: none; width: 100vw; height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; overflow: hidden; }
        
        /* NỀN TỪNG GIAI ĐOẠN */
        #phase1 { 
            display: flex; 
            background-image: url('Nengiaodiendau.png'); 
            background-size: cover; 
            background-position: center; 
        }
        #phase2 { 
            background: radial-gradient(circle, #fff0f5 0%, #ffc0cb 100%); 
        }
        #phase3 { 
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); 
        }
        #phase4 { 
            background: linear-gradient(to right, #ffecd2 0%, #fcb69f 100%); 
        }
        #phase5 {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        }

        /* NÚT BẤM CƠ BẢN */
        button { padding: 15px 35px; font-size: 22px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; z-index: 50; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: pulse 1.5s infinite; transition: 0.3s; }
        button:hover { transform: scale(1.1) !important; box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
        .btn-red { background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; }
        .btn-blue { background: linear-gradient(45deg, #007bff, #00d2ff); color: white; margin-top: 40px; }
        .btn-green { background: linear-gradient(45deg, #28a745, #84fab0); color: white; margin-top: 30px; display: none; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* MƯA CHỮ RƠI CHẬM */
        .falling-text { position: absolute; font-size: 22px; font-weight: bold; color: #ff4d6d; text-shadow: 0 0 10px rgba(255,255,255,0.8); animation: fall linear infinite; opacity: 0.8; z-index: 5; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

        /* BÁNH KEM 3D */
        .cake-container { position: relative; z-index: 10; margin-bottom: 20px; perspective: 1000px; }
        .cake-3d { 
            width: 280px; 
            border-radius: 20px; 
            filter: drop-shadow(0 30px 20px rgba(0,0,0,0.4)); 
            animation: float3D 5s ease-in-out infinite; 
            transform-style: preserve-3d;
        }
        @keyframes float3D { 
            0% { transform: translateY(0px) rotateY(-15deg) rotateX(5deg); } 
            50% { transform: translateY(-30px) rotateY(15deg) rotateX(-5deg) scale(1.05); filter: drop-shadow(0 40px 25px rgba(0,0,0,0.3)); } 
            100% { transform: translateY(0px) rotateY(-15deg) rotateX(5deg); } 
        }

        /* PHONG BÌ THƯ TÌNH */
        #envelope-container { cursor: pointer; animation: pulse 2s infinite; z-index: 10; }
        .envelope { width: 280px; height: 200px; background: #ff758c; position: relative; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin: 0 auto; }
        .envelope::before { content: ''; position: absolute; top: 0; left: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 110px solid #ff4d6d; z-index: 2; }
        .envelope-text { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 26px; color: white; z-index: 3; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); width: 100%; }
        
        /* BÊN TRONG BỨC THƯ */
        #open-letter { display: none; background: rgba(255, 255, 255, 0.85); border: 3px solid #ff4d6d; border-radius: 20px; padding: 30px; max-width: 90%; width: 600px; position: relative; box-shadow: 0 15px 40px rgba(255, 77, 109, 0.4); z-index: 10; animation: fadeIn 1s; backdrop-filter: blur(5px); }
        .heart-center { font-size: 55px; color: #ff4d6d; margin-bottom: 15px; animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        #message-text { font-size: 22px; line-height: 1.6; text-align: left; min-height: 150px; color: #333; font-weight: 500; }
        
        /* HOA TRANG TRÍ */
        .flower-corner { position: absolute; bottom: -30px; right: -30px; width: 120px; z-index: 20; transform: rotate(-10deg); filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); animation: sway 3s ease-in-out infinite; }
        @keyframes sway { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(-5deg); } }

        .floating-heart { position: absolute; color: #ff4d6d; font-size: 30px; animation: floatHeart 2.5s ease-out infinite; opacity: 0; z-index: 1; }
        @keyframes floatHeart { 0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateY(-200px) scale(1.5) rotate(45deg); opacity: 0; } }

        /* CUỐN SỔ ẢNH LẬT TRANG */
        .book-container { width: 90%; max-width: 450px; margin: 0 auto; position: relative; z-index: 10; perspective: 1200px; }
        .book-page { width: 100%; height: 450px; object-fit: cover; border-radius: 15px; border: 8px solid #fff; box-shadow: 0 15px 40px rgba(0,0,0,0.3); display: none; background: #fff; }
        .active-page { display: block; animation: flipPage 0.8s ease-out forwards; transform-origin: left center; }
        @keyframes flipPage { 0% { transform: rotateY(-90deg); opacity: 0; } 100% { transform: rotateY(0deg); opacity: 1; } }
        
        .page-controls { margin-top: 25px; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 20; position: relative; }
        .btn-page { padding: 12px 25px; background: #fff; color: #ff4d6d; border: 3px solid #ff4d6d; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,77,109,0.3); }
        .btn-page:hover { background: #ff4d6d; color: #fff; }

        /* NÚT BẤM ĐẾN QR (ẨN ĐI CHO ĐẾN KHI ĐẠT TRANG 7) */
        #btn-go-qr { display: none; background: linear-gradient(45deg, #ff007f, #ff758c); color: white; font-size: 24px; padding: 15px 40px; margin-top: 20px; border-radius: 50px; animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* KHU VỰC HIỂN THỊ MÃ QR */
        .qr-card { background: rgba(255, 255, 255, 0.9); border-radius: 25px; padding: 35px; box-shadow: 0 20px 50px rgba(255, 20, 147, 0.3); border: 4px dashed #ff4d6d; max-width: 90%; width: 400px; z-index: 10; animation: fadeIn 1.2s ease-in-out; }
        .qr-instruction { font-size: 22px; font-weight: bold; color: #d81b60; margin-bottom: 20px; line-height: 1.4; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .qr-image { width: 250px; height: 250px; object-fit: contain; border-radius: 15px; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); animation: zoomInOut 4s ease-in-out infinite; }
        @keyframes zoomInOut { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* BÓNG BAY TRANG TRÍ CHUNG */
        .balloon { position: absolute; bottom: -100px; width: 60px; height: 75px; background: #ff4d6d; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; animation: floatUp 6s ease-in-out infinite; opacity: 0.85; z-index: 2; box-shadow: inset -10px -10px 15px rgba(0,0,0,0.1); }
        .balloon::before { content: ""; position: absolute; bottom: -15px; left: 29px; width: 2px; height: 40px; background: rgba(255,255,255,0.8); }
        @keyframes floatUp { to { transform: translateY(-120vh) translateX(30px) rotate(10deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="sound-phaohoa" src="Phaohoa.mp3" loop></audio>
    <audio id="sound-votay" src="Votay.mp3"></audio>
    <audio id="sound-chucmung" src="Tiengchucmungsinhnhat.mp3"></audio>

    <div id="phase1" class="phase">
        <button class="btn-red" onclick="goToPhase2()">Bấm vô đây nè bé yêu ❤</button>
    </div>

    <div id="phase2" class="phase">
        <div id="rain-container-p2"></div>
        <div id="balloons-p2"></div>
        <div class="cake-container">
            <img class="cake-3d" src="Banhkem2D.png" alt="Bánh Kem Chủ Đề Heo">
        </div>
        <button class="btn-blue" onclick="goToPhase3()">Đọc Thư Tình</button>
    </div>
